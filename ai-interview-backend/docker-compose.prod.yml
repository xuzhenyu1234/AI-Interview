# 生产环境专用配置
# 使用系统Nginx作为反向代理，Docker内不运行Nginx
# 使用方式: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  # FastAPI应用 - 使用预构建的镜像
  app:
    image: ${IMAGE_TAG:-ghcr.io/dev-zetos/prepwise-app:latest}
    build: {}  # 覆盖构建上下文，使用镜像而非本地构建
    ports:
      - "127.0.0.1:${API_PORT:-8001}:${API_PORT:-8001}"
    environment:
      - ENV=production
    # 修复健康检查路径和端口
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:${API_PORT:-8001}/api/v1/config/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Celery Worker - 使用相同的镜像
  celery-worker:
    image: ${IMAGE_TAG:-ghcr.io/dev-zetos/prepwise-app:latest}
    build: {}  # 覆盖构建上下文，使用镜像而非本地构建
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Celery Beat - 使用相同的镜像
  celery-beat:
    image: ${IMAGE_TAG:-ghcr.io/dev-zetos/prepwise-app:latest}
    build: {}  # 覆盖构建上下文，使用镜像而非本地构建
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # Redis - 不暴露端口到主机
  redis:
    ports: []  # 覆盖默认配置，不暴露端口
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # 禁用Docker内的Nginx（使用系统Nginx）
  nginx:
    profiles:
      - donotstart

  # Flower监控 - 仅绑定到localhost
  flower:
    image: ${IMAGE_TAG:-ghcr.io/dev-zetos/prepwise-app:latest}
    build: {}  # 覆盖构建上下文，使用镜像而非本地构建
    ports:
      - "127.0.0.1:${FLOWER_PORT:-5555}:5555"
    profiles:
      - monitoring  # 需要时才启动
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"